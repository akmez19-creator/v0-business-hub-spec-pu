<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0f2847"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Truck body -->
  <rect x="80" y="220" width="220" height="140" rx="12" fill="#06b6d4"/>
  <!-- Truck cabin -->
  <path d="M300 260 L380 260 L380 360 L300 360 Z" fill="#0891b2"/>
  <path d="M300 260 L340 200 L380 200 L380 260 Z" fill="#22d3ee"/>
  <!-- Window -->
  <rect x="310" y="210" width="60" height="40" rx="4" fill="#0a1628" opacity="0.6"/>
  <!-- Wheels -->
  <circle cx="160" cy="360" r="40" fill="#1e293b"/>
  <circle cx="160" cy="360" r="24" fill="#334155"/>
  <circle cx="160" cy="360" r="8" fill="#06b6d4"/>
  <circle cx="340" cy="360" r="40" fill="#1e293b"/>
  <circle cx="340" cy="360" r="24" fill="#334155"/>
  <circle cx="340" cy="360" r="8" fill="#06b6d4"/>
  <!-- Package boxes on truck -->
  <rect x="100" y="240" width="50" height="50" rx="4" fill="#f59e0b"/>
  <rect x="160" y="250" width="40" height="40" rx="4" fill="#10b981"/>
  <rect x="210" y="235" width="55" height="55" rx="4" fill="#8b5cf6"/>
  <!-- Hub text/logo mark -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#06b6d4" text-anchor="middle">HUB</text>
</svg>
